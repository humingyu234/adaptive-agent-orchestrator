# AAO Policy — declarative control rules
# This file defines what is allowed, blocked, and requires human review.

mode: controlled

files:
  allowed:
    - src/orchestrator/**
    - tests/**
  protected:
    - .env
    - secrets/**
    - outputs/**

checks:
  required:
    - pytest

human_review:
  required_for:
    - high_risk_tool
    - protected_file_change
    - failed_tests

tools:
  shell:
    risk_level: high
  search:
    risk_level: low
